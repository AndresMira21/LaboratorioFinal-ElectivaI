<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Evaluaciones{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .navbar-brand { font-weight: bold; }
        .card { border: none; box-shadow: 0 2px 15px rgba(0,0,0,0.08); border-radius: 12px; }
        .card-header { border-radius: 12px 12px 0 0 !important; }
        .badge-aprobado { background-color: #198754; }
        .badge-reprobado { background-color: #dc3545; }
        .table th { background-color: #343a40; color: white; }
    </style>
</head>
<body>

{% if user.is_authenticated %}
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="{% url 'listar' %}">
        <i class="bi bi-mortarboard"></i> Evaluaciones
    </a>
    <div class="d-flex align-items-center gap-2">
        <a href="{% url 'listar' %}" class="btn btn-outline-light btn-sm">
            <i class="bi bi-list-ul"></i> Calificaciones
        </a>
        <a href="{% url 'crear' %}" class="btn btn-outline-success btn-sm">
            <i class="bi bi-plus-circle"></i> Nueva
        </a>
        <a href="{% url 'promedio_general' %}" class="btn btn-outline-info btn-sm">
            <i class="bi bi-bar-chart"></i> Promedios
        </a>
        <span class="text-white small ms-3">
            <i class="bi bi-person-circle"></i> {{ user.username }}
        </span>
        <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-sm">
            <i class="bi bi-box-arrow-right"></i> Salir
        </a>
    </div>
</nav>
{% endif %}

<div class="container py-4">
    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
